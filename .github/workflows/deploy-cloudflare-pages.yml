name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p .deploy
          cp index.html styles.css script.js favicon.svg robots.txt sitemap.xml .deploy/

      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Cloudflare account id (from dash.cloudflare.com/<account_id>/...)
          accountId: 7caebaf25bf9bfc1a1904b82be15ad7c
          projectName: gentlevale-care
          directory: .deploy
